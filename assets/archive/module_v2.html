<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Database Test</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Profile Registry</h1>
    
    <input type="text" id="newCode" placeholder="Enter new code...">
    <button onclick="addProfile()">Register</button>

    <h3>Registered Profiles:</h3>
    <ul id="userList"></ul>


    <script>
        // 1. CREDENTIALS
        const _URL = "https://zctzutsfflmasotxsqge.supabase.co"; 
        const _KEY = "sb_publishable_bxKVB0rjBnFO0H82I6EhUw_nEPnU7qT";

        // 2. INITIALIZE CLIENT
        const supabaseClient = supabase.createClient(_URL, _KEY);

        // 3. DIAGNOSTIC: Total row count
        supabaseClient
            .from('profiles')
            .select('*', { count: 'exact', head: true })
            .then(res => console.log("Total rows found:", res.count));

        // 4. MAIN CONNECTION AND RENDER LOGIC
        async function checkConnection() {
            console.log("Attempting to connect...");
            
            const { data, error } = await supabaseClient.from('profiles').select('*');
            
            if (error) {
                console.error("❌ Connection Error:", error.message);
            } else {
                console.log("✅ Database Connected! Data received:", data);
                
                // Render the data to the HTML list
                const list = document.getElementById('userList');
                list.innerHTML = ""; // Clear existing
                
                data.forEach(user => {
                    const li = document.createElement('li');
                    
                    const date = user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A';
                    li.textContent = `${user.username_code} (Registered: ${date})`;
                    list.appendChild(li);
    });
            }
        }

        async function addProfile() {
            const input = document.getElementById('newCode');
            const code = input.value.trim(); // Remove extra spaces

            if (!code) {
                alert("Please enter a code!");
                return;
            }

            const { error } = await supabaseClient
                .from('profiles')
                .insert([{ username_code: code }]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                input.value = ""; // Clear the box
                checkConnection(); // Refresh the list
            }
        }

        // Run the function
        checkConnection();
    </script>
</body>
</html>
